name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Generate platform files
      run: flutter create . --platforms android --project-name download_91 --org com.bilinico
    
    - name: Merge AndroidManifest.xml
      run: |
        # flutter create 已经在 android/ 目录生成了文件
        # 直接覆盖 AndroidManifest.xml
        if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
          # 确保目标目录存在
          mkdir -p android/app/src/main/res/xml
          # file_paths.xml 已经存在，不需要额外操作
          echo "AndroidManifest.xml already in place"
        fi
        # 如果 android 目录不存在（首次构建），需要处理
        if [ ! -d "android" ]; then
          echo "android directory will be created by flutter create"
        fi
    
    - name: Fix Android build config
      run: |
        # 设置 compileSdkVersion 34
        sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' android/app/build.gradle
        sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' android/app/build.gradle
        
        # 修复 Kotlin 版本冲突
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        
        # 在 android/build.gradle 中添加 Kotlin 版本强制
        if grep -q "ext.kotlin_version" android/build.gradle; then
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/g' android/build.gradle
        else
          sed -i '/buildscript {/a\    ext.kotlin_version = "1.9.0"' android/build.gradle
        fi
        
        # 添加 dependencies classpath
        if ! grep -q "kotlin-gradle-plugin" android/build.gradle; then
          sed -i '/dependencies {/a\        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"' android/build.gradle
        fi
        
        echo "Build config fixed"
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
